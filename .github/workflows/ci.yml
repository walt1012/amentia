name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SWIFT_PACKAGE_PATH: apps/pith-macos
  PREBUILT_ARTIFACT_DIR: artifacts/prebuilt
  SWIFT_APP_BINARY: PithApp
  RUNTIME_BINARY: pith-runtime-bin
  LLAMA_BINARY: llama-cli
  SWIFT_APP_ARTIFACT: PithApp-x86_64
  RUNTIME_ARTIFACT: pith-runtime-bin-x86_64
  LLAMA_ARTIFACT: llama-cli-x86_64
  MACOS_APP_ARTIFACT: Pith-macos-x86_64

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Validate model pack manifest
        run: python3 scripts/validate_model_pack.py

      - name: Check English-only policy
        run: python3 scripts/check_english_policy.py

      - name: Test packaging helpers
        run: python3 scripts/test_package_macos_app.py

      - name: Runtime smoke test
        run: python3 scripts/runtime_smoke_test.py

  model-catalog-remote:
    name: Remote model catalog audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit remote model catalog metadata
        run: python3 scripts/validate_model_pack.py --remote

  swift-app:
    name: Swift app build
    runs-on: macos-15-intel
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Cache Swift build output
        uses: actions/cache@v4
        with:
          path: apps/pith-macos/.build
          key: swift-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/pith-macos/Package.swift', 'apps/pith-macos/Sources/**/*.swift') }}
          restore-keys: |
            swift-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Build x86_64 Swift app executable
        shell: bash
        run: |
          set -euo pipefail
          swift build --package-path "$SWIFT_PACKAGE_PATH" -c release --arch x86_64
          bin_path="$(swift build --package-path "$SWIFT_PACKAGE_PATH" -c release --arch x86_64 --show-bin-path)"
          mkdir -p "$PREBUILT_ARTIFACT_DIR"
          cp "$bin_path/$SWIFT_APP_BINARY" "$PREBUILT_ARTIFACT_DIR/$SWIFT_APP_BINARY"
          chmod +x "$PREBUILT_ARTIFACT_DIR/$SWIFT_APP_BINARY"

      - name: Upload Swift app executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SWIFT_APP_ARTIFACT }}
          path: ${{ env.PREBUILT_ARTIFACT_DIR }}/${{ env.SWIFT_APP_BINARY }}
          if-no-files-found: error

  swift-tests:
    name: Swift app tests
    runs-on: macos-15-intel
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Cache Swift test output
        uses: actions/cache@v4
        with:
          path: apps/pith-macos/.build
          key: swift-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/pith-macos/Package.swift', 'apps/pith-macos/Sources/**/*.swift', 'apps/pith-macos/Tests/**/*.swift') }}
          restore-keys: |
            swift-test-${{ runner.os }}-${{ runner.arch }}-

      - name: Test x86_64 Swift app logic
        run: swift test --package-path "$SWIFT_PACKAGE_PATH" --arch x86_64

  macos-runtime:
    name: macOS runtime build
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache macOS runtime build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-keys: |
            macos-runtime-${{ runner.os }}-${{ runner.arch }}-

      - name: Build x86_64 runtime executable
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p pith-runtime-bin --release
          mkdir -p "$PREBUILT_ARTIFACT_DIR"
          cp "target/release/$RUNTIME_BINARY" "$PREBUILT_ARTIFACT_DIR/$RUNTIME_BINARY"
          chmod +x "$PREBUILT_ARTIFACT_DIR/$RUNTIME_BINARY"

      - name: Upload runtime executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RUNTIME_ARTIFACT }}
          path: ${{ env.PREBUILT_ARTIFACT_DIR }}/${{ env.RUNTIME_BINARY }}
          if-no-files-found: error

  macos-llama-backend:
    name: macOS llama.cpp backend
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - name: Install llama.cpp backend
        shell: bash
        run: |
          set -euo pipefail
          brew list llama.cpp >/dev/null 2>&1 || brew install llama.cpp
          backend="$(brew --prefix)/bin/llama-cli"
          test -x "$backend"
          archs="$(lipo -archs "$backend" 2>/dev/null || true)"
          if [[ -n "$archs" && "$archs" != *"x86_64"* ]]; then
            echo "::error title=llama.cpp backend architecture::Expected x86_64 llama-cli, got $archs"
            exit 1
          fi
          mkdir -p "$PREBUILT_ARTIFACT_DIR"
          cp "$backend" "$PREBUILT_ARTIFACT_DIR/$LLAMA_BINARY"
          chmod +x "$PREBUILT_ARTIFACT_DIR/$LLAMA_BINARY"

      - name: Upload llama.cpp backend
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LLAMA_ARTIFACT }}
          path: ${{ env.PREBUILT_ARTIFACT_DIR }}/${{ env.LLAMA_BINARY }}
          if-no-files-found: error

  swift:
    name: Package macOS app
    runs-on: macos-15-intel
    timeout-minutes: 30
    needs:
      - swift-app
      - swift-tests
      - macos-runtime
      - macos-llama-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Swift app executable
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.SWIFT_APP_ARTIFACT }}
          path: ${{ env.PREBUILT_ARTIFACT_DIR }}

      - name: Download runtime executable
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.RUNTIME_ARTIFACT }}
          path: ${{ env.PREBUILT_ARTIFACT_DIR }}

      - name: Download llama.cpp backend
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.LLAMA_ARTIFACT }}
          path: ${{ env.PREBUILT_ARTIFACT_DIR }}

      - name: Restore executable permissions
        run: |
          chmod +x \
            "$PREBUILT_ARTIFACT_DIR/$SWIFT_APP_BINARY" \
            "$PREBUILT_ARTIFACT_DIR/$RUNTIME_BINARY" \
            "$PREBUILT_ARTIFACT_DIR/$LLAMA_BINARY"

      - name: Build x86_64 macOS app bundle
        shell: bash
        run: |
          set +e
          python3 scripts/package_macos_app.py \
            --skip-build \
            --app-binary "$PREBUILT_ARTIFACT_DIR/$SWIFT_APP_BINARY" \
            --runtime-binary "$PREBUILT_ARTIFACT_DIR/$RUNTIME_BINARY" \
            --llama-binary "$PREBUILT_ARTIFACT_DIR/$LLAMA_BINARY" \
            2>&1 | tee macos-package.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "macOS app packaging failed. Last 120 lines:"
              tail -n 120 macos-package.log
            } > macos-package-summary.txt
            message="$(python3 -c 'from pathlib import Path; text = Path("macos-package-summary.txt").read_text(); text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"); print(text)')"
            echo "::error title=macOS app packaging failed::$message"
          fi
          exit "$status"

      - name: Smoke launch packaged macOS app
        run: python3 scripts/smoke_launch_macos_app.py artifacts/macos/Pith.app

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MACOS_APP_ARTIFACT }}
          path: artifacts/macos/Pith-macos-x86_64.zip
          if-no-files-found: error
