name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

      - name: Validate model pack manifest
        run: python3 scripts/validate_model_pack.py

      - name: Check English-only policy
        run: python3 scripts/check_english_policy.py

      - name: Runtime smoke test
        run: python3 scripts/runtime_smoke_test.py

  swift:
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build macOS app package
        working-directory: apps/pith-macos
        shell: bash
        run: |
          set +e
          swift build 2>&1 | tee swift-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "Swift build failed. Last 80 lines:"
              tail -n 80 swift-build.log
            } > swift-build-summary.txt
            message="$(python3 -c 'from pathlib import Path; text = Path("swift-build-summary.txt").read_text(); text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"); print(text)')"
            echo "::error title=Swift build failed::$message"
          fi
          exit "$status"
